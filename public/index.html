<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrevista CEMVET</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0D1F1A;
      color: white;
      padding: 40px;
      margin: 0;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 25px;
      font-size: 36px;
      line-height: 1.2;
    }

    p.sub {
      color: #d5e5dd;
      margin-bottom: 25px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      box-sizing: border-box;
      border: none;
      border-radius: 6px;
      font-size: 15px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      padding: 14px;
      width: 100%;
      background: #00c897;
      border: none;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      font-size: 16px;
      margin-top: 10px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #msg {
      margin-top: 20px;
      font-weight: bold;
    }

    .box {
      background: rgba(255,255,255,0.04);
      padding: 24px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">
      <h1>Entrevista Asistente Administrativo CEMVET</h1>
      <p class="sub">Completa la entrevista. Al enviar, el sistema procesará las respuestas.</p>

      <form id="form">
        <input type="text" placeholder="Nombre completo" name="nombre" required>
        <input type="email" placeholder="Correo electrónico" name="correo" required>

        <textarea placeholder="Cuéntanos tu experiencia en atención al cliente" name="experiencia" required></textarea>
        <textarea placeholder="¿Cómo manejas clientes difíciles?" name="conflictos" required></textarea>
        <textarea placeholder="¿Por qué quieres trabajar con nosotros?" name="motivacion" required></textarea>
        <textarea placeholder="¿Cómo organizas tu día cuando tienes muchas tareas?" name="organizacion" required></textarea>
        <textarea placeholder="¿Qué haces cuando cometes un error en el trabajo?" name="errores" required></textarea>
        <textarea placeholder="¿Cómo manejas el estrés en momentos de alta demanda?" name="estres" required></textarea>
        <textarea placeholder="¿Te consideras una persona ordenada? Explica." name="orden" required></textarea>
        <textarea placeholder="¿Cómo priorizas tareas urgentes vs importantes?" name="prioridades" required></textarea>
        <textarea placeholder="¿Has trabajado con agenda o citas? Cuéntanos." name="agenda" required></textarea>
        <textarea placeholder="¿Cómo manejas llamadas telefónicas difíciles?" name="llamadas" required></textarea>
        <textarea placeholder="¿Qué significa para ti el servicio al cliente?" name="servicio" required></textarea>
        <textarea placeholder="¿Cómo reaccionas ante una queja fuerte de un cliente?" name="quejas" required></textarea>
        <textarea placeholder="¿Qué harías si un cliente llega muy molesto?" name="cliente_molesto" required></textarea>
        <textarea placeholder="¿Cómo trabajas en equipo?" name="equipo" required></textarea>
        <textarea placeholder="¿Prefieres seguir instrucciones o tomar decisiones?" name="decision" required></textarea>
        <textarea placeholder="¿Qué harías si no sabes cómo hacer algo?" name="incertidumbre" required></textarea>
        <textarea placeholder="¿Cómo manejas información confidencial?" name="confidencialidad" required></textarea>
        <textarea placeholder="¿Te consideras puntual?" name="puntualidad" required></textarea>
        <textarea placeholder="¿Cómo reaccionas ante cambios inesperados?" name="cambios" required></textarea>
        <textarea placeholder="¿Qué te motiva a trabajar?" name="motivacion_personal" required></textarea>
        <textarea placeholder="¿Qué esperas de este trabajo?" name="expectativas" required></textarea>
        <textarea placeholder="¿Por qué deberíamos contratarte?" name="contratacion" required></textarea>
        <textarea placeholder="Describe tu mayor fortaleza" name="fortaleza" required></textarea>
        <textarea placeholder="Describe tu mayor debilidad" name="debilidad" required></textarea>

        <button type="submit" id="submitBtn">Enviar</button>
      </form>

      <p id="msg"></p>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      btn.disabled = true;
      msg.textContent = 'Enviando...';

      const data = Object.fromEntries(new FormData(form));

      try {
        const res = await fetch('/api', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (!res.ok) {
          throw new Error(result.error || 'Error al enviar');
        }

        console.log('RESPUESTA SERVIDOR:', result);
        msg.textContent = 'Formulario enviado correctamente ✅';
        form.reset();

      } catch (err) {
        console.error('ERROR FRONTEND:', err);
        msg.textContent = 'Error al enviar ❌';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
