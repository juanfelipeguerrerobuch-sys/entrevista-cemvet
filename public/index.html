<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrevista CEMVET</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0D1F1A;
      color: white;
      padding: 40px;
      margin: 0;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 25px;
      font-size: 34px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #00c897;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      color: black;
    }

    #msg {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Entrevista Asistente Administrativo - CEMVET</h1>

  <form id="form">

    <input name="nombre" placeholder="Nombre completo" required>
    <input type="email" name="correo" placeholder="Correo electrónico" required>

    <textarea name="experiencia" placeholder="Experiencia en atención al cliente" required></textarea>
    <textarea name="conflictos" placeholder="¿Cómo manejas clientes difíciles?" required></textarea>
    <textarea name="motivacion" placeholder="¿Por qué quieres trabajar con nosotros?" required></textarea>
    <textarea name="organizacion" placeholder="¿Cómo organizas tu día?" required></textarea>
    <textarea name="errores" placeholder="¿Qué haces cuando cometes un error?" required></textarea>
    <textarea name="estres" placeholder="¿Cómo manejas el estrés?" required></textarea>
    <textarea name="orden" placeholder="¿Eres una persona ordenada?" required></textarea>
    <textarea name="prioridades" placeholder="¿Cómo priorizas tareas?" required></textarea>
    <textarea name="agenda" placeholder="Experiencia con agendas" required></textarea>
    <textarea name="llamadas" placeholder="Manejo de llamadas difíciles" required></textarea>
    <textarea name="servicio" placeholder="¿Qué es servicio al cliente?" required></textarea>
    <textarea name="quejas" placeholder="¿Cómo manejas quejas?" required></textarea>
    <textarea name="cliente_molesto" placeholder="Cliente molesto" required></textarea>
    <textarea name="equipo" placeholder="Trabajo en equipo" required></textarea>
    <textarea name="decision" placeholder="¿Sigues o decides?" required></textarea>
    <textarea name="incertidumbre" placeholder="Cuando no sabes algo" required></textarea>
    <textarea name="confidencialidad" placeholder="Manejo de información" required></textarea>
    <textarea name="puntualidad" placeholder="¿Eres puntual?" required></textarea>
    <textarea name="cambios" placeholder="Cambios inesperados" required></textarea>
    <textarea name="motivacion_personal" placeholder="Motivación personal" required></textarea>
    <textarea name="expectativas" placeholder="Expectativas del trabajo" required></textarea>
    <textarea name="contratacion" placeholder="¿Por qué contratarte?" required></textarea>
    <textarea name="fortaleza" placeholder="Fortaleza" required></textarea>
    <textarea name="debilidad" placeholder="Debilidad" required></textarea>

    <button type="submit">Enviar</button>

  </form>

  <p id="msg"></p>
</div>

<script>
const URL = "https://entrevista-cemvet.onrender.com/api";

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const msg = document.getElementById("msg");
  msg.innerText = "Enviando...";

  const data = Object.fromEntries(new FormData(e.target));

  try {
    const res = await fetch(URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const text = await res.text();

    if (!res.ok) {
      throw new Error(text);
    }

    console.log("RESPUESTA:", text);

    msg.innerText = "Formulario enviado correctamente ✅";
    e.target.reset();

  } catch (err) {
    console.error("ERROR:", err);
    msg.innerText = "Error al enviar ❌";
  }
});
</script>

</body>
</html>
